services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: citech-web-app:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - appnet
    volumes:
      - storage:/var/www/html/storage
      - app_public:/var/www/html/public_shared
    command: sh -c "umask 0022 && cp -rp /var/www/html/public/. /var/www/html/public_shared/ && chmod -R 755 /var/www/html/storage && php-fpm"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:8080:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - app_public:/var/www/html/public
      - storage:/var/www/html/storage
    networks:
      - appnet
    depends_on:
      - app

  db:
    image: mysql:8.1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - appnet

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - appnet

volumes:
  db_data:
  storage:
  app_public:

networks:
  appnet:
    driver: bridge
